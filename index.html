<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasbro EU Brand Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#009CDE;--blue-dark:#0077A8;--blue-light:#E5F6FF;
      --bg:#F0F8FC;--white:#fff;--text:#003A54;--text2:#5A8DA0;
      --text3:#A0C8D8;--border:#D0EAF5;
      --green:#00B388;--green-bg:#E5FFF6;
      --red:#E8423F;--red-bg:#FFF0F0;
      --amber:#F5A623;--amber-bg:#FFF8EC;
      --purple:#9B59B6;--purple-bg:#F5EEF8;
      --ad-color:#4F46E5;--ad-bg:#EEF2FF;
      --org-color:#009CDE;--org-bg:#E5F6FF;
      --shadow:0 2px 16px rgba(0,156,222,0.08);
      --shadow-lg:0 8px 32px rgba(0,156,222,0.15);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    header{background:var(--blue);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:68px;box-shadow:0 4px 20px rgba(0,156,222,0.25);}
    .logo{display:flex;align-items:center;gap:14px;}
    .logo-mark{width:40px;height:40px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--blue);}
    .logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:white;}
    .logo-sub{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
    .header-right{display:flex;align-items:center;gap:14px;}
    .week-badge{background:rgba(255,255,255,0.15);border-radius:6px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;color:white;}
    .currency-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:6px;overflow:hidden;}
    .currency-btn{padding:6px 12px;border:none;background:transparent;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .currency-btn.active{background:white;color:var(--blue);}

    .filter-bar{background:white;padding:10px 40px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap;}
    .filter-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
    .market-tabs,.sort-tabs,.period-tabs{display:flex;gap:4px;}
    .market-tab,.sort-tab,.period-tab{padding:6px 14px;border-radius:6px;border:2px solid var(--border);background:var(--blue-light);color:var(--blue-dark);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .market-tab.active,.sort-tab.active,.period-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
    .divider{width:1px;height:24px;background:var(--border);flex-shrink:0;}
    .week-select{padding:6px 12px;border-radius:6px;border:2px solid var(--border);background:var(--blue-light);color:var(--blue-dark);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;outline:none;}

    /* TIME PIVOT BAR */
    .pivot-bar{background:white;padding:8px 40px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--border);flex-wrap:wrap;}
    .pivot-bar.hidden{display:none;}

    main{padding:24px 40px;max-width:1600px;margin:0 auto;display:grid;gap:28px;}

    .section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* SENTIMENT BAR */
    .sentiment-bar{display:flex;gap:16px;flex-wrap:wrap;}
    .sentiment-pill{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:50px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;border:2px solid;}
    .sentiment-pill.happy{background:var(--green-bg);border-color:var(--green);color:var(--green);}
    .sentiment-pill.sad{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
    .sentiment-pill.cry{background:var(--red-bg);border-color:var(--red);color:var(--red);}

    /* BRAND GRID */
    .brand-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
    .brand-card{background:white;border-radius:14px;padding:18px;box-shadow:var(--shadow);border:2px solid var(--border);cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
    .brand-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);}
    .brand-card.selected{box-shadow:var(--shadow-lg);border-width:3px;}
    .brand-card.happy{border-color:var(--green);}
    .brand-card.sad{border-color:var(--amber);}
    .brand-card.cry{border-color:var(--red);}
    .brand-card-accent{position:absolute;top:0;left:0;right:0;height:4px;}
    .brand-sentiment-emoji{position:absolute;top:14px;right:14px;font-size:26px;line-height:1;}
    .brand-card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;padding-right:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brand-sentiment-label{font-size:10px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}
    .brand-sentiment-label.happy{color:var(--green);}
    .brand-sentiment-label.sad{color:var(--amber);}
    .brand-sentiment-label.cry{color:var(--red);}
    .brand-metrics{display:grid;gap:6px;}
    .bm-row{display:flex;justify-content:space-between;align-items:center;}
    .bm-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
    .bm-right{display:flex;align-items:center;gap:4px;}
    .bm-value{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text);}
    .yoy{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;}
    .yoy-up{color:var(--green);background:var(--green-bg);}
    .yoy-down{color:var(--red);background:var(--red-bg);}
    .yoy-na{color:var(--text3);}
    .brand-divider{height:1px;background:var(--border);margin:8px 0;}
    .ltv-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-bg);padding:2px 6px;border-radius:4px;}
    .supply-alert{margin-top:8px;padding:5px 8px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;}
    .supply-alert.show-red{background:var(--red-bg);color:var(--red);}
    .supply-alert.show-amber{background:var(--amber-bg);color:var(--amber);}
    .ad-opp{margin-top:4px;padding:4px 8px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;background:var(--ad-bg);color:var(--ad-color);}

    /* EXPANDABLE ADS ROWS */
    .bm-expand-row{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .bm-expand-row:hover .bm-label{color:var(--blue);}
    .expand-toggle{font-size:9px;color:var(--text3);transition:transform 0.2s;display:inline-block;}
    .expand-toggle.open{transform:rotate(90deg);}
    .bm-sub-rows{display:none;margin-left:8px;margin-top:4px;display:none;border-left:2px solid var(--border);padding-left:8px;}
    .bm-sub-rows.open{display:grid;gap:3px;}
    .bm-sub-row{display:flex;justify-content:space-between;align-items:center;}
    .bm-sub-label{font-size:9px;color:var(--text2);font-weight:600;}
    .bm-sub-value{font-family:'DM Mono',monospace;font-size:10px;color:var(--text);}
    .dot-org{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--org-color);margin-right:3px;}
    .dot-ad{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ad-color);margin-right:3px;}

    /* ROOT CAUSE ANALYSIS */
    .rca-panel{background:white;border-radius:16px;box-shadow:var(--shadow);border:2px solid var(--border);overflow:hidden;}
    .rca-header{background:var(--blue-light);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);}
    .rca-brand{display:flex;align-items:center;gap:12px;}
    .rca-emoji{font-size:32px;}
    .rca-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--blue-dark);}
    .rca-subtitle{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
    .rca-tabs{display:flex;gap:4px;flex-wrap:wrap;}
    .rca-tab{padding:7px 14px;border-radius:6px;border:2px solid var(--border);background:white;color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;}
    .rca-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
    .rca-content{padding:20px 24px;}

    /* KPI ROW */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .kpi-card{background:var(--bg);border-radius:10px;padding:14px;border:1px solid var(--border);}
    .kpi-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;}
    .kpi-value.c-blue{color:var(--blue);}
    .kpi-value.c-green{color:var(--green);}
    .kpi-value.c-amber{color:var(--amber);}
    .kpi-value.c-red{color:var(--red);}
    .kpi-value.c-purple{color:var(--purple);}
    .kpi-value.c-text{color:var(--text);}
    .kpi-yoy{font-size:11px;font-weight:600;margin-top:4px;color:var(--text2);}

    /* ADS SPLIT IN KPI */
    .kpi-ads-split{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
    .kpi-split-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
    .kpi-split-pill.org{background:var(--org-bg);color:var(--org-color);}
    .kpi-split-pill.ad{background:var(--ad-bg);color:var(--ad-color);}

    /* TREND CHART */
    .trend-section{margin-bottom:24px;}
    .trend-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
    .trend-chart-wrap{position:relative;height:160px;background:var(--bg);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
    canvas.trend-canvas{width:100%;height:100%;}

    /* DATA TABLE */
    .data-table{width:100%;border-collapse:collapse;}
    .data-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:2px solid var(--border);white-space:nowrap;}
    .data-table th.r{text-align:right;}
    .data-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;}
    .data-table tr:last-child td{border-bottom:none;}
    .data-table tr:hover td{background:var(--blue-light);}
    .td-asin{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);}
    .td-name{color:var(--text2);font-weight:500;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
    .td-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);text-align:right;}
    .td-yoy{font-size:10px;font-weight:700;text-align:right;}
    .mp{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
    .mp-GB{background:#E8F4FF;color:#0077A8;}
    .mp-DE{background:#FFF3E0;color:#E65100;}
    .mp-FR{background:#F3E5F5;color:#6A1B9A;}
    .mp-IT{background:#E8F5E9;color:#2E7D32;}
    .mp-ES{background:#FFF8E1;color:#F57F17;}
    .bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:3px;}
    .bar-fg{height:100%;background:var(--blue);border-radius:2px;}
    .flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;}
    .flag-ad{background:var(--ad-bg);color:var(--ad-color);}
    .flag-oos{background:var(--red-bg);color:var(--red);}
    .flag-low{background:var(--amber-bg);color:var(--amber);}

    /* PIVOT TABLE */
    .pivot-table-wrap{overflow-x:auto;}
    .pivot-table{width:100%;border-collapse:collapse;min-width:600px;}
    .pivot-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg);}
    .pivot-table th.r{text-align:right;}
    .pivot-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;}
    .pivot-table tr:hover td{background:var(--blue-light);}
    .pivot-table tr:last-child td{border-bottom:none;font-weight:700;background:var(--blue-light);}

    /* SUPPLY PANEL */
    .supply-panel{background:white;border-radius:16px;box-shadow:var(--shadow);border:2px solid #FFD0D0;overflow:hidden;}
    .supply-header{background:linear-gradient(135deg,#FFF0F0,#FFF8EC);padding:16px 24px;border-bottom:2px solid #FFD0D0;display:flex;align-items:center;justify-content:space-between;}
    .supply-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;}
    .supply-items{display:grid;grid-template-columns:repeat(4,1fr);}
    .supply-item{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .supply-item:nth-child(4n){border-right:none;}
    .si-asin{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);margin-bottom:3px;}
    .si-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
    .si-stats{display:flex;gap:10px;flex-wrap:wrap;}
    .si-stat{font-size:10px;color:var(--text2);}

    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px;}
    .loading-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text2);}
    .loading-bar{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .loading-bar::after{content:'';display:block;height:100%;width:40%;background:var(--blue);border-radius:2px;animation:lb 1.2s ease infinite;}
    @keyframes lb{0%{transform:translateX(-150%)}100%{transform:translateX(400%)}}
    .no-data{text-align:center;padding:80px 40px;}
    .no-data-emoji{font-size:64px;margin-bottom:16px;}
    .no-data-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text2);margin-bottom:8px;}
    .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

    /* OOS colour helpers */
    .oos-green{color:var(--green);font-weight:700;}
    .oos-amber{color:var(--amber);font-weight:700;}
    .oos-red{color:var(--red);font-weight:700;}
    .cvr-green{color:var(--green);font-weight:700;}
    .cvr-amber{color:var(--amber);font-weight:700;}
    .cvr-red{color:var(--red);font-weight:700;}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">HB</div>
    <div>
      <div class="logo-text">Brand Health Dashboard</div>
      <div class="logo-sub">EU5 Weekly Performance</div>
    </div>
  </div>
  <div class="header-right">
    <div class="week-badge" id="week-badge">Loading...</div>
    <div class="currency-toggle">
      <button class="currency-btn active" id="btn-eur" onclick="setCurrency('eur')">€ EUR</button>
      <button class="currency-btn" id="btn-gbp" onclick="setCurrency('gbp')">£ GBP</button>
      <button class="currency-btn" id="btn-usd" onclick="setCurrency('usd')">$ USD</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">View</span>
  <div class="period-tabs">
    <button class="period-tab active" onclick="setPeriodMode('week',this)">Weekly</button>
    <button class="period-tab" onclick="setPeriodMode('month',this)">Monthly</button>
    <button class="period-tab" onclick="setPeriodMode('quarter',this)">Quarterly</button>
    <button class="period-tab" onclick="setPeriodMode('year',this)">Annual</button>
  </div>
  <div class="divider"></div>
  <span class="filter-label">Market</span>
  <div class="market-tabs">
    <button class="market-tab active" onclick="setMarket('ALL',this)">All EU5</button>
    <button class="market-tab" onclick="setMarket('GB',this)">🇬🇧 GB</button>
    <button class="market-tab" onclick="setMarket('DE',this)">🇩🇪 DE</button>
    <button class="market-tab" onclick="setMarket('FR',this)">🇫🇷 FR</button>
    <button class="market-tab" onclick="setMarket('IT',this)">🇮🇹 IT</button>
    <button class="market-tab" onclick="setMarket('ES',this)">🇪🇸 ES</button>
  </div>
  <div class="divider"></div>
  <span class="filter-label" id="period-label">Week</span>
  <select class="week-select" id="week-select" onchange="loadPeriod(this.value)">
    <option>Loading...</option>
  </select>
  <div class="divider"></div>
  <span class="filter-label">Sort</span>
  <div class="sort-tabs">
    <button class="sort-tab active" onclick="setSort('revenue',this)">Revenue</button>
    <button class="sort-tab" onclick="setSort('sentiment',this)">Sentiment</button>
    <button class="sort-tab" onclick="setSort('ltv',this)">LTV</button>
  </div>
</div>

<div id="loading-screen" class="loading-screen">
  <div class="loading-text">Loading brand data...</div>
  <div class="loading-bar"></div>
</div>

<div id="no-data-screen" class="no-data" style="display:none">
  <div class="no-data-emoji">📭</div>
  <div class="no-data-title">No data uploaded yet</div>
</div>

<main id="main-content" style="display:none">
  <div>
    <div class="section-title">Portfolio Health Summary</div>
    <div class="sentiment-bar" id="sentiment-bar"></div>
  </div>
  <div>
    <div class="section-title">Brand Scorecards — click for Root Cause Analysis</div>
    <div class="brand-grid" id="brand-grid"></div>
  </div>
  <div class="rca-panel" id="rca-panel" style="display:none">
    <div class="rca-header">
      <div class="rca-brand">
        <div class="rca-emoji" id="rca-emoji">—</div>
        <div>
          <div class="rca-name" id="rca-name">—</div>
          <div class="rca-subtitle">Root Cause Analysis</div>
        </div>
      </div>
      <div class="rca-tabs">
        <button class="rca-tab active" onclick="setTab('revenue',this)">Revenue</button>
        <button class="rca-tab" onclick="setTab('traffic',this)">Traffic</button>
        <button class="rca-tab" onclick="setTab('conversion',this)">Conversion</button>
        <button class="rca-tab" onclick="setTab('supply',this)">Supply &amp; OOS</button>
        <button class="rca-tab" onclick="setTab('ads',this)">Ads</button>
        <button class="rca-tab" onclick="setTab('adopp',this)">Ad Opportunities</button>
        <button class="rca-tab" onclick="setTab('trends',this)">Trends</button>
      </div>
    </div>
    <div class="rca-content">
      <div class="kpi-row" id="kpi-row"></div>
      <div id="table-wrap"></div>
    </div>
  </div>
  <div class="supply-panel">
    <div class="supply-header">
      <div class="supply-title">⚠️ Supply Gap Alerts</div>
      <span style="font-size:11px;color:var(--text2);font-weight:600;">OOS &gt; 10% or Unfilled &gt; 50</span>
    </div>
    <div class="supply-items" id="supply-items"></div>
  </div>
</main>

<script>
const SUPABASE_URL='https://rycqfwzgvpzwhphgclpb.supabase.co';
const SUPABASE_KEY='sb_publishable_CbKFhpN2dWI_UXhwGkclqw_AMPSprs4';
const FX={eur:1,gbp:0.862,usd:1.09};

const BRAND_COLORS={DISNEY_KIDS:'#9B59B6',MARVEL:'#E8423F',STAR_WARS:'#1a1a2e',MONOPOLY:'#B22222',GAMES:'#009CDE',PLAY_DOH:'#E91E8C',PEPPA_PIG:'#FF6B9D',TRANSFORMERS:'#F5A623',BEYBLADE:'#00B388',NERF:'#FF6B00',OTHER:'#A0C8D8'};
const BRAND_LABELS={DISNEY_KIDS:'Disney Kids',MARVEL:'Marvel / Spider-Man',STAR_WARS:'Star Wars',MONOPOLY:'Monopoly',GAMES:'Games',PLAY_DOH:'Play-Doh',PEPPA_PIG:'Peppa Pig',TRANSFORMERS:'Transformers',BEYBLADE:'Beyblade',NERF:'Nerf',OTHER:'Other'};
const BRAND_ORDER=['DISNEY_KIDS','MARVEL','STAR_WARS','MONOPOLY','GAMES','PLAY_DOH','PEPPA_PIG','TRANSFORMERS','BEYBLADE','NERF','OTHER'];

let currency='eur',currentMarket='ALL',currentSort='revenue',selectedBrand=null,currentTab='revenue';
let allRows=[],loyaltyData={},adsData={},allWeeks=[],allRowsAllWeeks=[],adsDataAllWeeks={};
let adsCoverageData={}; // brand_classified → { GB:{total,sp,sb}, DE:…, … }
let periodMode='week';
let currentPeriod=null;

// ─── THRESHOLD HELPERS ────────────────────────────────────────
function oosClass(pct) {
  if (pct<=6) return 'oos-green';
  if (pct<=9) return 'oos-amber';
  return 'oos-red';
}
function oosLabel(pct) {
  if (pct<=6) return 'green';
  if (pct<=9) return 'amber';
  return 'red';
}
function cvrClass(pct) {
  if (pct>=10) return 'cvr-green';
  if (pct>=5) return 'cvr-amber';
  return 'cvr-red';
}
function cvrLevel(pct) {
  if (pct>=10) return 'good';
  if (pct>=5) return 'ok';
  return 'bad';
}

// ─── PERIOD HELPERS ──────────────────────────────────────────
function getMonthKey(dateStr){const d=new Date(dateStr);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getQuarterKey(dateStr){const d=new Date(dateStr);const q=Math.ceil((d.getMonth()+1)/3);return`${d.getFullYear()}-Q${q}`;}
function getYearKey(dateStr){return String(new Date(dateStr).getFullYear());}
function periodKey(dateStr){
  if(periodMode==='week') return dateStr;
  if(periodMode==='month') return getMonthKey(dateStr);
  if(periodMode==='quarter') return getQuarterKey(dateStr);
  return getYearKey(dateStr);
}
function periodLabel(key){
  if(periodMode==='week'){const p=key.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  return key;
}

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  try {
    const [weeksRes,loyaltyRes,adsRes]=await Promise.all([
      sbFetch('/rest/v1/brand_health_weeks?select=*&order=week_start.desc'),
      sbFetch('/rest/v1/brand_health_loyalty?select=*&order=uploaded_at.desc'),
      sbFetch('/rest/v1/brand_health_ads?select=week_start,brand_classified,market,ad_revenue,ad_spend,ad_impressions,ad_clicks,ad_glance_views,organic_revenue,organic_glance_views&order=week_start.desc&limit=10000')
    ]);

    // Coverage fetch separately — table may not exist yet
    let coverageRes=[];
    try {
      const cr=await sbFetch('/rest/v1/brand_health_ads_coverage?select=*');
      if(Array.isArray(cr)) coverageRes=cr;
    } catch(e){ /* table not created yet */ }

    allWeeks=weeksRes;

    // Build loyalty lookup
    loyaltyData={};
    loyaltyRes.forEach(r=>{if(!loyaltyData[r.brand_classified])loyaltyData[r.brand_classified]=r;});

    // Build ads coverage lookup: brand_classified → { market → {total,sp,sb} }
    adsCoverageData={};
    coverageRes.forEach(r=>{
      if(!adsCoverageData[r.brand_classified]) adsCoverageData[r.brand_classified]={};
      adsCoverageData[r.brand_classified][r.market]={total:r.total_asins,sp:r.sp_asins,sb:r.sb_asins};
    });

    // Build ads lookup keyed by week_start+brand+market using row fields directly
    adsDataAllWeeks={};
    adsRes.forEach(r=>{
      const k=`${r.week_start}||${r.brand_classified}||${r.market||'ALL'}`;
      adsDataAllWeeks[k]=r;
    });

    if(!allWeeks.length){
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('no-data-screen').style.display='block';
      return;
    }

    // Load all snapshot data for trend/pivot (last 52 weeks max)
    const allSnapsRes=await sbFetch('/rest/v1/brand_health_snapshots?select=week_start,brand_classified,market,dispatched_revenue,ordered_revenue,dispatched_units,ordered_units,glance_views,oos_pct,unfilled_units,revenue_yoy,glance_views_yoy&limit=500000&order=week_start.desc');
    allRowsAllWeeks=allSnapsRes;

    buildPeriodSelect();
    await loadPeriod(currentPeriod);
  } catch(err) {
    document.getElementById('loading-screen').innerHTML=`<div style="color:var(--red);font-family:'DM Mono',monospace;font-size:12px;text-align:center;padding:40px">Error: ${err.message}</div>`;
  }
}

function sbFetch(path){
  return fetch(SUPABASE_URL+path,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
    .then(r=>r.json())
    .then(data=>Array.isArray(data)?data:[]);
}

function buildPeriodSelect(){
  // Build unique period keys from allWeeks
  const seen=new Set(); const options=[];
  allWeeks.forEach(w=>{
    const k=periodKey(w.week_start);
    if(!seen.has(k)){
      seen.add(k);
      const label=periodMode==='week'?(w.week_label||w.week_start):k;
      options.push({value:k,label});
    }
  });
  const sel=document.getElementById('week-select');
  sel.innerHTML=options.map(o=>`<option value="${o.value}">${o.label}</option>`).join('');
  document.getElementById('period-label').textContent=periodMode.charAt(0).toUpperCase()+periodMode.slice(1);
  if(options.length) currentPeriod=options[0].value;
}

async function loadPeriod(periodVal) {
  if(!periodVal) return;
  currentPeriod=periodVal;
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('main-content').style.display='none';

  // Get all week_start values that belong to this period
  const weekStarts=allWeeks.map(w=>w.week_start).filter(ws=>periodKey(ws)===periodVal);

  if(periodMode==='week'&&weekStarts.length===1){
    // Single week — fetch full detail
    const res=await sbFetch(`/rest/v1/brand_health_snapshots?week_start=eq.${weekStarts[0]}&select=*&limit=20000`);
    allRows=res;
    // Build ads lookup for this week using || key format
    adsData={};
    Object.entries(adsDataAllWeeks).forEach(([k,v])=>{
      const [ws,bid,mkt]=k.split('||');
      if(ws!==weekStarts[0]) return;
      if(!adsData[bid]) adsData[bid]={};
      const mk=mkt||'ALL';
      if(!adsData[bid][mk]) adsData[bid][mk]={ad_revenue:0,ad_spend:0,ad_impressions:0,ad_clicks:0,organic_revenue:0,organic_glance_views:0,ad_glance_views:0};
      adsData[bid][mk].ad_revenue+=(v.ad_revenue||0);
      adsData[bid][mk].ad_spend+=(v.ad_spend||0);
      adsData[bid][mk].ad_impressions+=(v.ad_impressions||0);
      adsData[bid][mk].ad_clicks+=(v.ad_clicks||0);
      adsData[bid][mk].organic_revenue+=(v.organic_revenue||0);
      adsData[bid][mk].organic_glance_views+=(v.organic_glance_views||0);
      adsData[bid][mk].ad_glance_views+=(v.ad_glance_views||0);
    });
    console.log('adsData keys:', Object.keys(adsData));
    console.log('adsDataAllWeeks sample:', Object.entries(adsDataAllWeeks).slice(0,3).map(([k,v])=>({k,brand:v.brand_classified,market:v.market,spend:v.ad_spend})));
  } else {
    // Multi-week (month/quarter/year) — aggregate from allRowsAllWeeks
    allRows=allRowsAllWeeks.filter(r=>weekStarts.includes(r.week_start));
    // Aggregate ads for selected period — sum across all markets, then filter by currentMarket when rendering
    adsData={};
    Object.entries(adsDataAllWeeks).forEach(([k,v])=>{
      const [ws,bid,mkt]=k.split('||');
      if(!weekStarts.includes(ws)) return;
      if(!adsData[bid]) adsData[bid]={};
      if(!adsData[bid][mkt]) adsData[bid][mkt]={ad_revenue:0,ad_spend:0,ad_impressions:0,ad_clicks:0,organic_revenue:0,organic_glance_views:0,ad_glance_views:0};
      adsData[bid][mkt].ad_revenue+=(v.ad_revenue||0);
      adsData[bid][mkt].ad_spend+=(v.ad_spend||0);
      adsData[bid][mkt].ad_impressions+=(v.ad_impressions||0);
      adsData[bid][mkt].ad_clicks+=(v.ad_clicks||0);
      adsData[bid][mkt].organic_revenue+=(v.organic_revenue||0);
      adsData[bid][mkt].organic_glance_views+=(v.organic_glance_views||0);
      adsData[bid][mkt].ad_glance_views+=(v.ad_glance_views||0);
    });
  }

  const sel=document.getElementById('week-select');
  const selOpt=sel.options[sel.selectedIndex];
  document.getElementById('week-badge').textContent=selOpt?.text||periodVal;
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('main-content').style.display='grid';
  buildDashboard();
}

function setPeriodMode(mode,btn){
  periodMode=mode;
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildPeriodSelect();
  loadPeriod(currentPeriod);
}

// ─── DATA ─────────────────────────────────────────────────────
function getRows(brandId) {
  let rows=allRows.filter(r=>r.brand_classified===brandId);
  if(currentMarket!=='ALL') rows=rows.filter(r=>r.market===currentMarket);
  return rows;
}

function aggregateBrand(brandId) {
  const rows=getRows(brandId);
  let revenue=0,revYoyN=0,revYoyD=0,units=0,gviews=0,gvYoyN=0,gvYoyD=0,unfilled=0,oosVals=[];
  rows.forEach(r=>{
    const rev=r.dispatched_revenue||r.ordered_revenue||0;
    revenue+=rev; units+=r.dispatched_units||r.ordered_units||0;
    if(r.revenue_yoy!==null&&r.revenue_yoy!==undefined&&rev>0){revYoyN+=rev*r.revenue_yoy;revYoyD+=rev;}
    const gv=r.glance_views||0; gviews+=gv;
    if(r.glance_views_yoy!==null&&r.glance_views_yoy!==undefined&&gv>0){gvYoyN+=gv*r.glance_views_yoy;gvYoyD+=gv;}
    unfilled+=r.unfilled_units||0;
    if(r.oos_pct!==null&&r.oos_pct!==undefined) oosVals.push(r.oos_pct);
  });
  const avgOos=oosVals.length>0?oosVals.reduce((a,b)=>a+b,0)/oosVals.length:0;
  const conv=gviews>0?(units/gviews)*100:0;
  const asp=units>0?revenue/units:0;
  const loyalty=loyaltyData[brandId];
  const repeatRate=loyalty?loyalty.repeat_rate:null;
  const ltv=repeatRate&&repeatRate<1&&asp>0?asp/(1-repeatRate):null;
  // Aggregate ads for this brand — filtered by currentMarket
  let ads=null;
  if(adsData[brandId]){
    const mkts=currentMarket==='ALL'?Object.keys(adsData[brandId]):[currentMarket];
    ads={ad_revenue:0,ad_spend:0,ad_impressions:0,ad_clicks:0,organic_revenue:0,organic_glance_views:0,ad_glance_views:0};
    mkts.forEach(mk=>{
      const a=adsData[brandId][mk];
      if(a){
        ads.ad_revenue+=(a.ad_revenue||0);
        ads.ad_spend+=(a.ad_spend||0);
        ads.ad_impressions+=(a.ad_impressions||0);
        ads.ad_clicks+=(a.ad_clicks||0);
        ads.organic_revenue+=(a.organic_revenue||0);
        ads.organic_glance_views+=(a.organic_glance_views||0);
        ads.ad_glance_views+=(a.ad_glance_views||0);
      }
    });
    if(ads.ad_revenue===0&&ads.ad_spend===0) ads=null;
  }
  if(brandId==='GAMES') console.log('GAMES ads debug:', JSON.stringify(adsData['GAMES']), 'result:', ads);
  return{revenue,revenueYoy:revYoyD>0?revYoyN/revYoyD:null,units,asp,conv,gviews,gviewsYoy:gvYoyD>0?gvYoyN/gvYoyD:null,unfilled,avgOos,repeatRate,ltv,loyaltyQuarter:loyalty?.quarter,ads};
}

// Updated sentiment logic using new thresholds
function getSentiment(d) {
  const revDown = d.revenueYoy !== null && d.revenueYoy < -0.05; // >5% decline
  const revUp   = d.revenueYoy !== null && d.revenueYoy > 0.02;  // >2% growth
  const cvrBad  = cvrLevel(d.conv) === 'bad';   // <5%
  const oosBad  = oosLabel(d.avgOos) === 'red'; // >=10%

  // CRY: only genuinely bad combinations
  if (d.avgOos > 20) return 'cry';              // severe OOS alone is enough
  if (oosBad && cvrBad) return 'cry';           // bad supply + bad CVR
  if (revDown && cvrBad && oosBad) return 'cry'; // all three bad

  // HAPPY: revenue growing, CVR not bad, OOS not red
  if (revUp && !cvrBad && !oosBad) return 'happy';

  // Everything else is mixed
  return 'sad';
}

const SC={happy:{emoji:'😊',label:'Happy',cls:'happy'},sad:{emoji:'😐',label:'Mixed',cls:'sad'},cry:{emoji:'😢',label:'Needs Attention',cls:'cry'}};

// ─── BUILD DASHBOARD ─────────────────────────────────────────
function buildDashboard() {
  renderSentimentBar();
  renderBrandCards();
  renderSupplyAlerts();
  if(selectedBrand) renderRCA(selectedBrand,currentTab);
}

function renderSentimentBar() {
  const counts={happy:0,sad:0,cry:0};
  BRAND_ORDER.forEach(id=>{
    const d=aggregateBrand(id);
    if(d.revenue===0&&d.gviews===0) return;
    counts[getSentiment(d)]++;
  });
  document.getElementById('sentiment-bar').innerHTML=`
    <div class="sentiment-pill happy"><span style="font-size:20px">😊</span><span style="font-size:22px;font-weight:800">${counts.happy}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Brands Happy</span></div>
    <div class="sentiment-pill sad"><span style="font-size:20px">😐</span><span style="font-size:22px;font-weight:800">${counts.sad}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Brands Mixed</span></div>
    <div class="sentiment-pill cry"><span style="font-size:20px">😢</span><span style="font-size:22px;font-weight:800">${counts.cry}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Need Attention</span></div>
  `;
}

function getSortedBrands() {
  const brands=BRAND_ORDER.map(id=>({id,data:aggregateBrand(id)})).filter(b=>b.data.revenue>0||b.data.gviews>0);
  if(currentSort==='revenue') brands.sort((a,b)=>b.data.revenue-a.data.revenue);
  else if(currentSort==='sentiment'){const order={cry:0,sad:1,happy:2};brands.sort((a,b)=>order[getSentiment(a.data)]-order[getSentiment(b.data)]);}
  else if(currentSort==='ltv') brands.sort((a,b)=>(b.data.ltv||0)-(a.data.ltv||0));
  return brands;
}

function renderBrandCards() {
  const grid=document.getElementById('brand-grid');
  grid.innerHTML='';
  getSortedBrands().forEach(({id,data:d})=>{
    const s=getSentiment(d);
    const sc=SC[s];
    const color=BRAND_COLORS[id];

    // Issue count — what's genuinely wrong at brand level
    let issueCount=0;
    if(oosLabel(d.avgOos)==='red')   issueCount++;      // avg OOS >=10%
    if(oosLabel(d.avgOos)==='amber') issueCount+=0.5;   // avg OOS 7-9%
    if(cvrLevel(d.conv)==='bad')     issueCount++;      // CVR <5%
    if(cvrLevel(d.conv)==='ok')      issueCount+=0.5;   // CVR 5-9%
    if(d.revenueYoy!==null&&d.revenueYoy<-0.05)  issueCount++;   // rev down >5%
    if(d.gviewsYoy!==null&&d.gviewsYoy<-0.1)     issueCount+=0.5; // traffic down >10%

    const issueInt=Math.ceil(issueCount);
    const supplyClass=issueCount>=2?'show-red':issueCount>=1?'show-amber':'';
    const supplyText=issueCount>=1?`⚠️ Root Cause (${issueInt} issue${issueInt>1?'s':''})`:'';
    const ads=d.ads;
    const hasAds=ads!=null&&(ads.ad_spend>0||ads.ad_revenue>0);
    const adRevPct=hasAds&&d.revenue>0?((ads.ad_revenue/d.revenue)*100).toFixed(0):null;
    const adGvPct=hasAds&&d.gviews>0?((ads.ad_glance_views/d.gviews)*100).toFixed(0):null;

    const card=document.createElement('div');
    card.className=`brand-card ${sc.cls}${selectedBrand===id?' selected':''}`;
    card.onclick=()=>selectBrand(id,card);
    card.innerHTML=`
      <div class="brand-card-accent" style="background:${color}"></div>
      <div class="brand-sentiment-emoji">${sc.emoji}</div>
      <div class="brand-card-name">${BRAND_LABELS[id]}</div>
      <div class="brand-sentiment-label ${sc.cls}">${sc.label}</div>
      <div class="brand-metrics">
        <div class="bm-expand-row" onclick="toggleExpand(event,'rev-${id}')">
          <span class="bm-label">Revenue <span class="expand-toggle" id="tog-rev-${id}">▶</span></span>
          <span class="bm-right"><span class="bm-value">${fmtCur(d.revenue)}</span>${fmtYoy(d.revenueYoy)}</span>
        </div>
        <div class="bm-sub-rows" id="rev-${id}">
          ${hasAds?`
          <div class="bm-sub-row"><span class="bm-sub-label"><span class="dot-org"></span>Organic</span><span class="bm-sub-value">${fmtCur(ads.organic_revenue||0)}</span></div>
          <div class="bm-sub-row"><span class="bm-sub-label"><span class="dot-ad"></span>Ad Attributed</span><span class="bm-sub-value">${fmtCur(ads.ad_revenue||0)} <span style="color:var(--ad-color);font-size:9px">${adRevPct}%</span></span></div>
          <div class="bm-sub-row"><span class="bm-sub-label" style="color:var(--ad-color)">◆ ROAS</span><span class="bm-sub-value" style="color:${ads.ad_spend>0?(ads.ad_revenue/ads.ad_spend)>=4?'var(--green)':(ads.ad_revenue/ads.ad_spend)>=2?'var(--amber)':'var(--red)':'var(--text3)'};font-weight:700">${ads.ad_spend>0?(ads.ad_revenue/ads.ad_spend).toFixed(2)+'x':'—'}</span></div>
          `:'<div class="bm-sub-row"><span class="bm-sub-label" style="color:var(--text3)">No ads data uploaded</span></div>'}
        </div>
        <div class="bm-expand-row" onclick="toggleExpand(event,'gv-${id}')">
          <span class="bm-label">Glance Views <span class="expand-toggle" id="tog-gv-${id}">▶</span></span>
          <span class="bm-right"><span class="bm-value">${fmtNum(d.gviews)}</span>${fmtYoy(d.gviewsYoy)}</span>
        </div>
        <div class="bm-sub-rows" id="gv-${id}">
          ${hasAds?`
          <div class="bm-sub-row"><span class="bm-sub-label"><span class="dot-org"></span>Organic</span><span class="bm-sub-value">${fmtNum(ads.organic_glance_views||0)}</span></div>
          <div class="bm-sub-row"><span class="bm-sub-label"><span class="dot-ad"></span>Ad Traffic</span><span class="bm-sub-value">${fmtNum(ads.ad_glance_views||0)} <span style="color:var(--ad-color);font-size:9px">${adGvPct}%</span></span></div>
          `:'<div class="bm-sub-row"><span class="bm-sub-label" style="color:var(--text3)">No ads data uploaded</span></div>'}
        </div>
        <div class="bm-row"><span class="bm-label">Conversion</span><span class="bm-right"><span class="bm-value ${cvrClass(d.conv)}">${d.conv.toFixed(2)}%</span></span></div>
        <div class="bm-row"><span class="bm-label">ASP</span><span class="bm-right"><span class="bm-value">${fmtCur(d.asp)}</span></span></div>
        <div class="bm-row"><span class="bm-label">OOS</span><span class="bm-right"><span class="bm-value ${oosClass(d.avgOos)}">${d.avgOos.toFixed(1)}%</span></span></div>
        <div class="brand-divider"></div>
        <div class="bm-row"><span class="bm-label">Repeat Rate</span><span class="bm-right"><span class="bm-value">${d.repeatRate!==null?(d.repeatRate*100).toFixed(1)+'%':'<span style="color:var(--text3);font-size:9px">No Q data</span>'}</span></span></div>
        <div class="bm-row"><span class="bm-label">Est. LTV</span><span class="bm-right"><span class="ltv-badge" style="${d.ltv?'':'opacity:0.35'}">${d.ltv?fmtCur(d.ltv):'—'}</span></span></div>
      </div>
      ${supplyClass?`<div class="supply-alert ${supplyClass}">${supplyText}</div>`:''}
    `;
    grid.appendChild(card);
  });
}

function toggleExpand(evt,id){
  evt.stopPropagation();
  const el=document.getElementById(id);
  const tog=document.getElementById('tog-'+id);
  if(!el) return;
  const open=el.classList.toggle('open');
  if(tog) tog.classList.toggle('open',open);
}

function selectBrand(brandId,cardEl) {
  selectedBrand=brandId;
  document.querySelectorAll('.brand-card').forEach(c=>c.classList.remove('selected'));
  if(cardEl) cardEl.classList.add('selected');
  const d=aggregateBrand(brandId);
  document.getElementById('rca-emoji').textContent=SC[getSentiment(d)].emoji;
  document.getElementById('rca-name').textContent=BRAND_LABELS[brandId];
  document.getElementById('rca-panel').style.display='block';
  renderRCA(brandId,currentTab);
  setTimeout(()=>document.getElementById('rca-panel').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function setTab(tab,btn) {
  currentTab=tab;
  document.querySelectorAll('.rca-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(selectedBrand) renderRCA(selectedBrand,tab);
}

            </div>
          </div>
          ${currentMarket==='ALL'?`
          <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">SP Coverage by Market</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${['GB','DE','FR','IT','ES'].map(mk=>{
              const m=cov[mk];if(!m)return'';
              const pct=m.total>0?Math.round(m.sp/m.total*100):0;
              const col=pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--red)';

      wrap.innerHTML=`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
          <div style="background:var(--org-bg);border:1px solid var(--org-color);border-radius:12px;padding:16px;">
            <div style="font-size:11px;font-weight:700;color:var(--org-color);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">🌿 Organic</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div><div style="font-size:10px;color:var(--text2);font-weight:600;margin-bottom:3px">Revenue</div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--org-color)">${fmtCur(ads.organic_revenue||0)}</div><div style="font-size:10px;color:var(--text2)">${orgRevPct}% of total</div></div>
              <div><div style="font-size:10px;color:var(--text2);font-weight:600;margin-bottom:3px">Glance Views</div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--org-color)">${fmtNum(ads.organic_glance_views||0)}</div><div style="font-size:10px;color:var(--text2)">${orgGvPct}% of total</div></div>
            </div>

          <div style="background:var(--ad-bg);border:1px solid var(--ad-color);border-radius:12px;padding:16px;">

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
              <div><div style="font-size:10px;color:var(--text2);font-weight:600;margin-bottom:3px">Ad Revenue</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--ad-color)">${fmtCur(ads.ad_revenue||0)}</div><div style="font-size:10px;color:var(--text2)">${adRevPct2}% of total</div></div>
              <div><div style="font-size:10px;color:var(--text2);font-weight:600;margin-bottom:3px">Ad Spend</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--ad-color)">${fmtCur(ads.ad_spend||0)}</div><div style="font-size:10px;color:${parseFloat(acos)>30?'var(--red)':parseFloat(acos)>20?'var(--amber)':'var(--green)'}">ACoS: ${acos}%</div></div>
              <div><div style="font-size:10px;color:var(--text2);font-weight:600;margin-bottom:3px">ROAS</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${parseFloat(roas)>=4?'var(--green)':parseFloat(roas)>=2?'var(--amber)':'var(--red)'}">${roas||'—'}x</div><div style="font-size:10px;color:var(--text2)">CTR: ${ctr||'—'}%</div></div>
            </div>
          </div>
        </div>
        <div style="margin-bottom:20px;">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Revenue Mix</div>

          </div>
        </div>
        <div style="margin-bottom:24px;">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Traffic Mix (Clicks as Glance Views)</div>

            <div style="width:${orgGvPct}%;background:var(--org-color);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;transition:width 0.5s">${orgGvPct}%</div>
            <div style="flex:1;background:var(--ad-color);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white">${adGvPct2}%</div>
          </div>
        </div>
        ${coverageHtml}`;
    }

  } else if(tab==='adopp') {
    const m=buildAsinMap(rows,r=>({rev:r.dispatched_revenue||r.ordered_revenue||0,units:r.dispatched_units||r.ordered_units||0,gv:r.glance_views||0,oos:r.oos_pct||0}));
    const opps=Object.values(m).filter(r=>r.gv>50).map(r=>({...r,asp:r.units>0?r.rev/r.units:0,conv:r.gv>0?(r.units/r.gv)*100:0}))
      .filter(r=>r.asp>5&&r.oos<10).sort((a,b)=>(b.asp*b.gv)-(a.asp*a.gv)).slice(0,15);
    wrap.innerHTML=`<div style="background:var(--ad-bg);border:1px solid var(--ad-color);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text2);">
      <b style="color:var(--ad-color)">💡 Ad Opportunity Logic:</b> High ASP + low CVR + decent traffic + in stock (OOS &lt;10%). Prime candidates for Sponsored Products.
    </div>`+
    (opps.length===0?'<div class="empty">No strong ad opportunities identified.</div>':
    buildTable(['#','ASIN','Product','Markets','ASP','CVR','Views','OOS','Score'],
      opps.map((r,i)=>{
        const score=Math.round((r.asp*r.gv/1000)*(1-(r.conv/8)));
        return`<tr>
          <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
          <td><div class="td-asin">${r.asin}</div></td>
          <td><span class="td-name">${r.name}<span class="flag flag-ad">AD OPP</span></span></td>

          <td class="td-val">${r.gv.toLocaleString()}</td>
          <td class="td-val"><span class="${oosClass(r.oos)}">${r.oos.toFixed(1)}%</span></td>
          <td class="td-val" style="color:var(--ad-color);font-weight:700">${score}</td>
        </tr>`;
      })));

  } else if(tab==='trends') {
    renderTrendsTab(brandId,wrap);
  }
}

// ─── TRENDS TAB ──────────────────────────────────────────────
function renderTrendsTab(brandId, wrap) {
  // Get all weeks with data for this brand
  const byWeek={};
  allRowsAllWeeks.filter(r=>r.brand_classified===brandId&&(currentMarket==='ALL'||r.market===currentMarket)).forEach(r=>{
    if(!byWeek[r.week_start]) byWeek[r.week_start]={revenue:0,gviews:0,units:0,oos:[]};
    byWeek[r.week_start].revenue+=(r.dispatched_revenue||r.ordered_revenue||0);
    byWeek[r.week_start].gviews+=(r.glance_views||0);
    byWeek[r.week_start].units+=(r.dispatched_units||r.ordered_units||0);
    if(r.oos_pct!=null) byWeek[r.week_start].oos.push(r.oos_pct);
  });

  // Aggregate by current period mode
  const byPeriod={};
  Object.entries(byWeek).forEach(([ws,d])=>{
    const pk=periodKey(ws);
    if(!byPeriod[pk]) byPeriod[pk]={revenue:0,gviews:0,units:0,oos:[],label:periodLabel(pk)};
    byPeriod[pk].revenue+=d.revenue;
    byPeriod[pk].gviews+=d.gviews;
    byPeriod[pk].units+=d.units;
    byPeriod[pk].oos.push(...d.oos);
  });

  const periods=Object.keys(byPeriod).sort().slice(-26); // last 26 periods
  if(!periods.length){wrap.innerHTML='<div class="empty">Not enough historical data yet. Data builds up as you upload each week.</div>';return;}

  const labels=periods.map(p=>byPeriod[p].label||p);
  const revenues=periods.map(p=>byPeriod[p].revenue);
  const gviews=periods.map(p=>byPeriod[p].gviews);
  const convs=periods.map(p=>byPeriod[p].gviews>0?(byPeriod[p].units/byPeriod[p].gviews)*100:0);
  const ooss=periods.map(p=>byPeriod[p].oos.length>0?byPeriod[p].oos.reduce((a,b)=>a+b,0)/byPeriod[p].oos.length:0);

  wrap.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div style="background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;">
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Revenue Trend</div>
        <canvas id="c-rev" height="120"></canvas>
      </div>
      <div style="background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;">
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Glance Views Trend</div>
        <canvas id="c-gv" height="120"></canvas>
      </div>
      <div style="background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;">
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Conversion Rate %</div>
        <canvas id="c-cvr" height="120"></canvas>
      </div>
      <div style="background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;">
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">OOS % (avg)</div>
        <canvas id="c-oos" height="120"></canvas>
      </div>
    </div>
    <div class="pivot-table-wrap">
      <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Period Summary Table</div>
      <table class="pivot-table">
        <thead><tr><th>${periodMode.charAt(0).toUpperCase()+periodMode.slice(1)}</th><th class="r">Revenue</th><th class="r">Glance Views</th><th class="r">CVR %</th><th class="r">Avg OOS %</th></tr></thead>
        <tbody>
          ${periods.map(p=>{
            const pd=byPeriod[p];
            const conv=pd.gviews>0?(pd.units/pd.gviews)*100:0;
            const oos=pd.oos.length>0?pd.oos.reduce((a,b)=>a+b,0)/pd.oos.length:0;
            return`<tr>
              <td style="font-weight:600">${pd.label||p}</td>
              <td class="td-val">${fmtCur(pd.revenue)}</td>
              <td class="td-val">${fmtNum(pd.gviews)}</td>
              <td class="td-val"><span class="${cvrClass(conv)}">${conv.toFixed(2)}%</span></td>
              <td class="td-val"><span class="${oosClass(oos)}">${oos.toFixed(1)}%</span></td>
            </tr>`;
          }).join('')}
          <tr>
            <td>TOTAL / AVG</td>
            <td class="td-val">${fmtCur(revenues.reduce((a,b)=>a+b,0))}</td>
            <td class="td-val">${fmtNum(gviews.reduce((a,b)=>a+b,0))}</td>
            <td class="td-val">${(convs.reduce((a,b)=>a+b,0)/convs.length).toFixed(2)}%</td>
            <td class="td-val">${(ooss.reduce((a,b)=>a+b,0)/ooss.length).toFixed(1)}%</td>
          </tr>
        </tbody>
      </table>
    </div>`;

  // Draw sparkline charts
  requestAnimationFrame(()=>{
    drawLineChart('c-rev', labels, revenues, '#009CDE', v=>fmtCur(v));
    drawLineChart('c-gv', labels, gviews, '#00B388', v=>fmtNum(v));
    drawLineChart('c-cvr', labels, convs, '#F5A623', v=>v.toFixed(1)+'%', [5,10]);
    drawLineChart('c-oos', labels, ooss, '#E8423F', v=>v.toFixed(1)+'%', [6,10]);
  });
}

function drawLineChart(canvasId, labels, data, color, fmt, thresholds) {
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth||canvas.offsetWidth||300;
  const h=parseInt(canvas.getAttribute('height'))||120;
  canvas.width=w*dpr; canvas.height=h*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const pad={t:10,r:10,b:30,l:50};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  if(!data.length) return;
  const min=Math.min(...data)*0.9, max=Math.max(...data)*1.1;
  const range=max-min||1;
  const toX=(i)=>pad.l+i*(cw/(data.length-1||1));
  const toY=(v)=>pad.t+ch-(((v-min)/range)*ch);

  // Threshold zones
  if(thresholds&&thresholds.length===2){
    const y1=toY(thresholds[0]), y2=toY(thresholds[1]);
    ctx.fillStyle='rgba(232,66,63,0.06)'; ctx.fillRect(pad.l,pad.t,cw,Math.max(0,toY(min)-toY(thresholds[0])));
    ctx.fillStyle='rgba(245,166,35,0.06)'; ctx.fillRect(pad.l,Math.min(y1,y2),cw,Math.abs(y1-y2));
    ctx.fillStyle='rgba(0,179,136,0.06)'; ctx.fillRect(pad.l,pad.t,cw,Math.max(0,toY(thresholds[1])-pad.t));
  }

  // Grid lines
  ctx.strokeStyle='rgba(208,234,245,0.8)'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(t=>{
    const y=pad.t+t*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    ctx.fillStyle='#5A8DA0'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='right';
    ctx.fillText(fmt(min+(1-t)*range),pad.l-4,y+3);
  });

  // Area fill
  ctx.beginPath(); ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((_,i)=>{if(i>0)ctx.lineTo(toX(i),toY(data[i]));});
  ctx.lineTo(toX(data.length-1),h-pad.b); ctx.lineTo(toX(0),h-pad.b); ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,h-pad.b);
  grad.addColorStop(0,color+'33'); grad.addColorStop(1,color+'00');
  ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((_,i)=>{if(i>0)ctx.lineTo(toX(i),toY(data[i]));});
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();

  // Dots
  data.forEach((v,i)=>{
    ctx.beginPath(); ctx.arc(toX(i),toY(v),3,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
  });

  // X labels (show every Nth)
  const step=Math.ceil(labels.length/6);
  ctx.fillStyle='#5A8DA0'; ctx.font='9px Inter,sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i)=>{if(i%step===0)ctx.fillText(l.substring(0,8),toX(i),h-pad.b+12);});
}

// ─── SUPPLY ALERTS ────────────────────────────────────────────
function renderSupplyAlerts() {
  let rows=allRows;
  if(currentMarket!=='ALL') rows=rows.filter(r=>r.market===currentMarket);
  const seen=new Set(); const alerts=[];
  rows.forEach(r=>{
    const oos=r.oos_pct||0; const uf=r.unfilled_units||0;
    if((oos>=10||uf>50)&&r.asin){
      // In ALL view, de-dupe by ASIN only; in market view, by ASIN+market
      const k=currentMarket==='ALL'?r.asin:r.asin+'_'+r.market;
      if(!seen.has(k)){
        seen.add(k);
        alerts.push({asin:r.asin,name:r.product_title,market:r.market,oos,uf});
      } else if(currentMarket==='ALL') {
        // Accumulate unfilled across markets for same ASIN
        const existing=alerts.find(a=>a.asin===r.asin);
        if(existing) existing.uf+=uf;
      }
    }
  });
  alerts.sort((a,b)=>b.uf-a.uf);
  const g=document.getElementById('supply-items');
  if(!alerts.length){g.innerHTML='<div class="empty">✅ No supply gap alerts this week</div>';return;}
  g.innerHTML=alerts.slice(0,16).map(a=>`
    <div class="supply-item">
      <div class="si-asin">${a.asin} ${currentMarket==='ALL'?'<span style="font-size:9px;color:var(--text3)">EU5</span>':`<span class="mp mp-${a.market}">${a.market}</span>`}</div>
      <div class="si-name" title="${a.name}">${a.name}</div>
      <div class="si-stats">
        <div class="si-stat"><b class="${oosClass(a.oos)}">${a.oos.toFixed(1)}%</b> OOS</div>
        <div class="si-stat"><b style="color:${a.uf>100?'var(--red)':'var(--amber)'}">${Math.round(a.uf)}</b> unfilled</div>
      </div>
    </div>`).join('');
}

function buildAsinMap(rows, extractor) {
  const useMarket = currentMarket !== 'ALL';
  const m = {};
  const noSumKeys = ['revYoy','gvYoy','oos'];

  rows.forEach(r => {
    const k = useMarket ? r.asin + '_' + r.market : r.asin;
    if (!m[k]) {
      m[k] = {
        asin: r.asin,
        name: r.product_title,
        market: useMarket ? r.market : 'EU5',
        markets: new Set(),
        ...Object.fromEntries(Object.entries(extractor(r)).map(([key, v]) => [key, typeof v === 'number' ? 0 : null]))
      };
    }
    m[k].markets.add(r.market);
    // Prefer longest title
    if (!useMarket && r.product_title && r.product_title.length > (m[k].name||'').length) {
      m[k].name = r.product_title;
    }
    const vals = extractor(r);
    Object.entries(vals).forEach(([key, val]) => {
      if (val !== null && val !== undefined) {
        if (noSumKeys.includes(key)) {
          if (m[k][key] === null) m[k][key] = val;
          else m[k][key] = (m[k][key] + val) / 2;
        } else {
          m[k][key] = (m[k][key] || 0) + val;
        }
      }
    });
  });
  // Convert markets Set to sorted string
  Object.values(m).forEach(row => {
    row.marketsStr = useMarket ? row.market : [...row.markets].sort().join(' ');
    delete row.markets;
  });
  return m;
}

function buildTable(headers,rows){
  return`<table class="data-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function setSort(s,btn){currentSort=s;document.querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderBrandCards();}

// ─── FORMATTING ──────────────────────────────────────────────
function fmtCur(val){
  const v=val*FX[currency];
  const sym=currency==='gbp'?'£':currency==='usd'?'$':'€';
  if(v>=1000000) return sym+(v/1000000).toFixed(1)+'M';
  if(v>=1000) return sym+(v/1000).toFixed(1)+'K';
  return sym+v.toFixed(0);
}
function fmtNum(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return Math.round(n).toLocaleString();}
function fmtYoy(val){
  if(val===null||val===undefined||isNaN(val))return'<span class="yoy yoy-na">n/a</span>';
  const p=(val*100).toFixed(1);const cls=val>0?'yoy-up':val<0?'yoy-down':'yoy-na';const arr=val>0?'▲':val<0?'▼':'';
  return`<span class="yoy ${cls}">${arr}${Math.abs(p)}%</span>`;
}
function fmtYoyText(val){
  if(val===null||val===undefined||isNaN(val))return'<span style="color:var(--text3)">n/a</span>';
  const p=(val*100).toFixed(1);const col=val>0?'var(--green)':val<0?'var(--red)':'var(--text3)';const arr=val>0?'▲':val<0?'▼':'';
  return`<span style="color:${col};font-weight:700">${arr}${Math.abs(p)}%</span>`;
}
