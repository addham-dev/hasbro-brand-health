<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasbro EU Brand Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#009CDE;--blue-dark:#0077A8;--blue-light:#E5F6FF;
      --bg:#F0F8FC;--white:#fff;--text:#003A54;--text2:#5A8DA0;
      --text3:#A0C8D8;--border:#D0EAF5;
      --green:#00B388;--green-bg:#E5FFF6;
      --red:#E8423F;--red-bg:#FFF0F0;
      --amber:#F5A623;--amber-bg:#FFF8EC;
      --purple:#9B59B6;--purple-bg:#F5EEF8;
      --shadow:0 2px 16px rgba(0,156,222,0.08);
      --shadow-lg:0 8px 32px rgba(0,156,222,0.15);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    header{background:var(--blue);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:68px;box-shadow:0 4px 20px rgba(0,156,222,0.25);}
    .logo{display:flex;align-items:center;gap:14px;}
    .logo-mark{width:40px;height:40px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--blue);}
    .logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:white;}
    .logo-sub{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
    .header-right{display:flex;align-items:center;gap:14px;}
    .week-badge{background:rgba(255,255,255,0.15);border-radius:6px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;color:white;}
    .currency-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:6px;overflow:hidden;}
    .currency-btn{padding:6px 12px;border:none;background:transparent;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .currency-btn.active{background:white;color:var(--blue);}

    .filter-bar{background:white;padding:10px 40px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap;}
    .filter-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
    .market-tabs,.sort-tabs{display:flex;gap:4px;}
    .market-tab,.sort-tab{padding:6px 14px;border-radius:6px;border:2px solid var(--border);background:var(--blue-light);color:var(--blue-dark);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .market-tab.active,.sort-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
    .divider{width:1px;height:24px;background:var(--border);}
    .week-select{padding:6px 12px;border-radius:6px;border:2px solid var(--border);background:var(--blue-light);color:var(--blue-dark);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;outline:none;}

    main{padding:24px 40px;max-width:1600px;margin:0 auto;display:grid;gap:28px;}

    .section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* SENTIMENT BAR */
    .sentiment-bar{display:flex;gap:16px;flex-wrap:wrap;}
    .sentiment-pill{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:50px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;border:2px solid;}
    .sentiment-pill.happy{background:var(--green-bg);border-color:var(--green);color:var(--green);}
    .sentiment-pill.sad{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
    .sentiment-pill.cry{background:var(--red-bg);border-color:var(--red);color:var(--red);}

    /* BRAND GRID */
    .brand-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
    .brand-card{background:white;border-radius:14px;padding:18px;box-shadow:var(--shadow);border:2px solid var(--border);cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
    .brand-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);}
    .brand-card.selected{box-shadow:var(--shadow-lg);border-width:3px;}
    .brand-card.happy{border-color:var(--green);}
    .brand-card.sad{border-color:var(--amber);}
    .brand-card.cry{border-color:var(--red);}
    .brand-card-accent{position:absolute;top:0;left:0;right:0;height:4px;}
    .brand-sentiment-emoji{position:absolute;top:14px;right:14px;font-size:26px;line-height:1;}
    .brand-card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px;padding-right:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brand-sentiment-label{font-size:10px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}
    .brand-sentiment-label.happy{color:var(--green);}
    .brand-sentiment-label.sad{color:var(--amber);}
    .brand-sentiment-label.cry{color:var(--red);}
    .brand-metrics{display:grid;gap:6px;}
    .bm-row{display:flex;justify-content:space-between;align-items:center;}
    .bm-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
    .bm-right{display:flex;align-items:center;gap:4px;}
    .bm-value{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text);}
    .yoy{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;}
    .yoy-up{color:var(--green);background:var(--green-bg);}
    .yoy-down{color:var(--red);background:var(--red-bg);}
    .yoy-na{color:var(--text3);}
    .brand-divider{height:1px;background:var(--border);margin:8px 0;}
    .loyalty-row{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
    .ltv-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-bg);padding:2px 6px;border-radius:4px;}
    .supply-alert{margin-top:8px;padding:5px 8px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;}
    .supply-alert.show-red{background:var(--red-bg);color:var(--red);}
    .supply-alert.show-amber{background:var(--amber-bg);color:var(--amber);}
    .ad-opp{margin-top:4px;padding:4px 8px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;background:#EEF2FF;color:#4F46E5;}

    /* ROOT CAUSE ANALYSIS */
    .rca-panel{background:white;border-radius:16px;box-shadow:var(--shadow);border:2px solid var(--border);overflow:hidden;}
    .rca-header{background:var(--blue-light);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);}
    .rca-brand{display:flex;align-items:center;gap:12px;}
    .rca-emoji{font-size:32px;}
    .rca-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--blue-dark);}
    .rca-subtitle{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
    .rca-tabs{display:flex;gap:4px;}
    .rca-tab{padding:7px 14px;border-radius:6px;border:2px solid var(--border);background:white;color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;}
    .rca-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
    .rca-content{padding:20px 24px;}

    /* KPI ROW */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .kpi-card{background:var(--bg);border-radius:10px;padding:14px;border:1px solid var(--border);}
    .kpi-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;}
    .kpi-value.c-blue{color:var(--blue);}
    .kpi-value.c-green{color:var(--green);}
    .kpi-value.c-amber{color:var(--amber);}
    .kpi-value.c-red{color:var(--red);}
    .kpi-value.c-purple{color:var(--purple);}
    .kpi-value.c-text{color:var(--text);}
    .kpi-yoy{font-size:11px;font-weight:600;margin-top:4px;color:var(--text2);}

    /* DATA TABLE */
    .data-table{width:100%;border-collapse:collapse;}
    .data-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;border-bottom:2px solid var(--border);white-space:nowrap;}
    .data-table th.r{text-align:right;}
    .data-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;}
    .data-table tr:last-child td{border-bottom:none;}
    .data-table tr:hover td{background:var(--blue-light);}
    .td-asin{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);}
    .td-name{color:var(--text2);font-weight:500;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
    .td-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);text-align:right;}
    .td-yoy{font-size:10px;font-weight:700;text-align:right;}
    .mp{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
    .mp-GB{background:#E8F4FF;color:#0077A8;}
    .mp-DE{background:#FFF3E0;color:#E65100;}
    .mp-FR{background:#F3E5F5;color:#6A1B9A;}
    .mp-IT{background:#E8F5E9;color:#2E7D32;}
    .mp-ES{background:#FFF8E1;color:#F57F17;}
    .bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:3px;}
    .bar-fg{height:100%;background:var(--blue);border-radius:2px;}
    .flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;}
    .flag-ad{background:#EEF2FF;color:#4F46E5;}
    .flag-oos{background:var(--red-bg);color:var(--red);}
    .flag-low{background:var(--amber-bg);color:var(--amber);}

    /* SUPPLY PANEL */
    .supply-panel{background:white;border-radius:16px;box-shadow:var(--shadow);border:2px solid #FFD0D0;overflow:hidden;}
    .supply-header{background:linear-gradient(135deg,#FFF0F0,#FFF8EC);padding:16px 24px;border-bottom:2px solid #FFD0D0;display:flex;align-items:center;justify-content:space-between;}
    .supply-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;}
    .supply-items{display:grid;grid-template-columns:repeat(4,1fr);}
    .supply-item{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
    .supply-item:nth-child(4n){border-right:none;}
    .si-asin{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);margin-bottom:3px;}
    .si-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
    .si-stats{display:flex;gap:10px;flex-wrap:wrap;}
    .si-stat{font-size:10px;color:var(--text2);}

    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px;}
    .loading-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text2);}
    .loading-bar{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .loading-bar::after{content:'';display:block;height:100%;width:40%;background:var(--blue);border-radius:2px;animation:lb 1.2s ease infinite;}
    @keyframes lb{0%{transform:translateX(-150%)}100%{transform:translateX(400%)}}
    .no-data{text-align:center;padding:80px 40px;}
    .no-data-emoji{font-size:64px;margin-bottom:16px;}
    .no-data-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text2);margin-bottom:8px;}
    .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">HB</div>
    <div>
      <div class="logo-text">Brand Health Dashboard</div>
      <div class="logo-sub">EU5 Weekly Performance</div>
    </div>
  </div>
  <div class="header-right">
    <div class="week-badge" id="week-badge">Loading...</div>
    <div class="currency-toggle">
      <button class="currency-btn active" id="btn-eur" onclick="setCurrency('eur')">€ EUR</button>
      <button class="currency-btn" id="btn-gbp" onclick="setCurrency('gbp')">£ GBP</button>
      <button class="currency-btn" id="btn-usd" onclick="setCurrency('usd')">$ USD</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Market</span>
  <div class="market-tabs">
    <button class="market-tab active" onclick="setMarket('ALL',this)">All EU5</button>
    <button class="market-tab" onclick="setMarket('GB',this)">🇬🇧 GB</button>
    <button class="market-tab" onclick="setMarket('DE',this)">🇩🇪 DE</button>
    <button class="market-tab" onclick="setMarket('FR',this)">🇫🇷 FR</button>
    <button class="market-tab" onclick="setMarket('IT',this)">🇮🇹 IT</button>
    <button class="market-tab" onclick="setMarket('ES',this)">🇪🇸 ES</button>
  </div>
  <div class="divider"></div>
  <span class="filter-label">Week</span>
  <select class="week-select" id="week-select" onchange="loadWeek(this.value)">
    <option>Loading...</option>
  </select>
  <div class="divider"></div>
  <span class="filter-label">Sort</span>
  <div class="sort-tabs">
    <button class="sort-tab active" onclick="setSort('revenue',this)">Revenue</button>
    <button class="sort-tab" onclick="setSort('sentiment',this)">Sentiment</button>
    <button class="sort-tab" onclick="setSort('ltv',this)">LTV</button>
  </div>
</div>

<div id="loading-screen" class="loading-screen">
  <div class="loading-text">Loading brand data...</div>
  <div class="loading-bar"></div>
</div>

<div id="no-data-screen" class="no-data" style="display:none">
  <div class="no-data-emoji">📭</div>
  <div class="no-data-title">No data uploaded yet</div>
</div>

<main id="main-content" style="display:none">
  <div>
    <div class="section-title">Portfolio Health Summary</div>
    <div class="sentiment-bar" id="sentiment-bar"></div>
  </div>
  <div>
    <div class="section-title">Brand Scorecards — click for Root Cause Analysis</div>
    <div class="brand-grid" id="brand-grid"></div>
  </div>
  <div class="rca-panel" id="rca-panel" style="display:none">
    <div class="rca-header">
      <div class="rca-brand">
        <div class="rca-emoji" id="rca-emoji">—</div>
        <div>
          <div class="rca-name" id="rca-name">—</div>
          <div class="rca-subtitle">Root Cause Analysis</div>
        </div>
      </div>
      <div class="rca-tabs">
        <button class="rca-tab active" onclick="setTab('revenue',this)">Revenue</button>
        <button class="rca-tab" onclick="setTab('traffic',this)">Traffic</button>
        <button class="rca-tab" onclick="setTab('conversion',this)">Conversion</button>
        <button class="rca-tab" onclick="setTab('supply',this)">Supply &amp; OOS</button>
        <button class="rca-tab" onclick="setTab('adopp',this)">Ad Opportunities</button>
      </div>
    </div>
    <div class="rca-content">
      <div class="kpi-row" id="kpi-row"></div>
      <div id="table-wrap"></div>
    </div>
  </div>
  <div class="supply-panel">
    <div class="supply-header">
      <div class="supply-title">⚠️ Supply Gap Alerts</div>
      <span style="font-size:11px;color:var(--text2);font-weight:600;">OOS &gt; 10% or Unfilled &gt; 50</span>
    </div>
    <div class="supply-items" id="supply-items"></div>
  </div>
</main>

<script>
const SUPABASE_URL='https://rycqfwzgvpzwhphgclpb.supabase.co';
const SUPABASE_KEY='sb_publishable_CbKFhpN2dWI_UXhwGkclqw_AMPSprs4';
const FX={eur:1,gbp:0.862,usd:1.09};

const BRAND_COLORS={DISNEY_KIDS:'#9B59B6',MARVEL:'#E8423F',STAR_WARS:'#1a1a2e',MONOPOLY:'#B22222',GAMES:'#009CDE',PLAY_DOH:'#E91E8C',PEPPA_PIG:'#FF6B9D',TRANSFORMERS:'#F5A623',BEYBLADE:'#00B388',NERF:'#FF6B00',OTHER:'#A0C8D8'};
const BRAND_LABELS={DISNEY_KIDS:'Disney Kids',MARVEL:'Marvel / Spider-Man',STAR_WARS:'Star Wars',MONOPOLY:'Monopoly',GAMES:'Games',PLAY_DOH:'Play-Doh',PEPPA_PIG:'Peppa Pig',TRANSFORMERS:'Transformers',BEYBLADE:'Beyblade',NERF:'Nerf',OTHER:'Other'};
const BRAND_ORDER=['DISNEY_KIDS','MARVEL','STAR_WARS','MONOPOLY','GAMES','PLAY_DOH','PEPPA_PIG','TRANSFORMERS','BEYBLADE','NERF','OTHER'];

let currency='eur',currentMarket='ALL',currentSort='revenue',selectedBrand=null,currentTab='revenue';
let allRows=[],loyaltyData={};

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  try {
    const [weeksRes,loyaltyRes]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/brand_health_weeks?select=*&order=week_start.desc`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}}),
      fetch(`${SUPABASE_URL}/rest/v1/brand_health_loyalty?select=*&order=uploaded_at.desc`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}})
    ]);
    const weeks=await weeksRes.json();
    const loyalty=await loyaltyRes.json();

    // Build loyalty lookup — latest per brand
    loyaltyData={};
    loyalty.forEach(r=>{
      if(!loyaltyData[r.brand_classified]) loyaltyData[r.brand_classified]=r;
    });

    if(!weeks.length){
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('no-data-screen').style.display='block';
      return;
    }
    const sel=document.getElementById('week-select');
    sel.innerHTML=weeks.map(w=>`<option value="${w.week_start}">${w.week_label||w.week_start}</option>`).join('');
    await loadWeek(weeks[0].week_start);
  } catch(err) {
    document.getElementById('loading-screen').innerHTML=`<div style="color:var(--red);font-family:'DM Mono',monospace;font-size:12px;text-align:center;padding:40px">Error: ${err.message}</div>`;
  }
}

async function loadWeek(weekStart) {
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('main-content').style.display='none';
  const res=await fetch(`${SUPABASE_URL}/rest/v1/brand_health_snapshots?week_start=eq.${weekStart}&select=*&limit=20000`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
  allRows=await res.json();
  const sel=document.getElementById('week-select');
  document.getElementById('week-badge').textContent=sel.options[sel.selectedIndex]?.text||weekStart;
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('main-content').style.display='grid';
  buildDashboard();
}

// ─── DATA ─────────────────────────────────────────────────────
function getRows(brandId) {
  let rows=allRows.filter(r=>r.brand_classified===brandId);
  if(currentMarket!=='ALL') rows=rows.filter(r=>r.market===currentMarket);
  return rows;
}

function aggregateBrand(brandId) {
  const rows=getRows(brandId);
  let revenue=0,revYoyN=0,revYoyD=0,units=0,gviews=0,gvYoyN=0,gvYoyD=0,unfilled=0,oosVals=[];
  rows.forEach(r=>{
    const rev=r.dispatched_revenue||r.ordered_revenue||0;
    revenue+=rev; units+=r.dispatched_units||r.ordered_units||0;
    if(r.revenue_yoy!==null&&r.revenue_yoy!==undefined&&rev>0){revYoyN+=rev*r.revenue_yoy;revYoyD+=rev;}
    const gv=r.glance_views||0; gviews+=gv;
    if(r.glance_views_yoy!==null&&r.glance_views_yoy!==undefined&&gv>0){gvYoyN+=gv*r.glance_views_yoy;gvYoyD+=gv;}
    unfilled+=r.unfilled_units||0;
    if(r.oos_pct!==null&&r.oos_pct!==undefined) oosVals.push(r.oos_pct);
  });
  const asp=units>0?revenue/units:0;
  const loyalty=loyaltyData[brandId];
  const repeatRate=loyalty?loyalty.repeat_rate:null;
  const ltv=repeatRate&&repeatRate<1&&asp>0?asp/(1-repeatRate):null;
  return{revenue,revenueYoy:revYoyD>0?revYoyN/revYoyD:null,units,asp,conv:gviews>0?(units/gviews)*100:0,gviews,gviewsYoy:gvYoyD>0?gvYoyN/gvYoyD:null,unfilled,avgOos:oosVals.length>0?oosVals.reduce((a,b)=>a+b,0)/oosVals.length:0,repeatRate,ltv,loyaltyQuarter:loyalty?.quarter};
}

function getSentiment(d) {
  const revUp=d.revenueYoy!==null&&d.revenueYoy>0;
  const revDown=d.revenueYoy!==null&&d.revenueYoy<0;
  const gvDown=d.gviewsYoy!==null&&d.gviewsYoy<0;
  const supplyBad=d.avgOos>20||d.unfilled>200;
  if(revDown&&(gvDown||supplyBad)) return 'cry';
  if(revUp&&d.gviewsYoy!==null&&d.gviewsYoy>0&&!supplyBad) return 'happy';
  return 'sad';
}

const SC={happy:{emoji:'😊',label:'Happy',cls:'happy'},sad:{emoji:'😐',label:'Mixed',cls:'sad'},cry:{emoji:'😢',label:'Needs Attention',cls:'cry'}};

function isAdOpportunity(d) {
  return d.asp>8&&d.conv<10&&d.gviews>500&&d.avgOos<20;
}

// ─── BUILD DASHBOARD ─────────────────────────────────────────
function buildDashboard() {
  renderSentimentBar();
  renderBrandCards();
  renderSupplyAlerts();
  if(selectedBrand) renderRCA(selectedBrand,currentTab);
}

function renderSentimentBar() {
  const counts={happy:0,sad:0,cry:0};
  BRAND_ORDER.forEach(id=>{
    const d=aggregateBrand(id);
    if(d.revenue===0&&d.gviews===0) return;
    counts[getSentiment(d)]++;
  });
  document.getElementById('sentiment-bar').innerHTML=`
    <div class="sentiment-pill happy"><span style="font-size:20px">😊</span><span style="font-size:22px;font-weight:800">${counts.happy}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Brands Happy</span></div>
    <div class="sentiment-pill sad"><span style="font-size:20px">😐</span><span style="font-size:22px;font-weight:800">${counts.sad}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Brands Mixed</span></div>
    <div class="sentiment-pill cry"><span style="font-size:20px">😢</span><span style="font-size:22px;font-weight:800">${counts.cry}</span><span style="font-size:12px;font-weight:600;opacity:0.8">Need Attention</span></div>
  `;
}

function getSortedBrands() {
  const brands=BRAND_ORDER.map(id=>({id,data:aggregateBrand(id)})).filter(b=>b.data.revenue>0||b.data.gviews>0);
  if(currentSort==='revenue') brands.sort((a,b)=>b.data.revenue-a.data.revenue);
  else if(currentSort==='sentiment') {
    const order={cry:0,sad:1,happy:2};
    brands.sort((a,b)=>order[getSentiment(a.data)]-order[getSentiment(b.data)]);
  } else if(currentSort==='ltv') {
    brands.sort((a,b)=>(b.data.ltv||0)-(a.data.ltv||0));
  }
  return brands;
}

function renderBrandCards() {
  const grid=document.getElementById('brand-grid');
  grid.innerHTML='';
  getSortedBrands().forEach(({id,data:d})=>{
    const s=getSentiment(d);
    const sc=SC[s];
    const color=BRAND_COLORS[id];
    const supplyClass=d.avgOos>20||d.unfilled>200?'show-red':d.avgOos>10||d.unfilled>50?'show-amber':'';
    const supplyText=d.avgOos>10?`⚠️ OOS ${d.avgOos.toFixed(0)}%`:d.unfilled>50?`⚠️ ${Math.round(d.unfilled).toLocaleString()} unfilled`:'';
    const adOpp=isAdOpportunity(d);

    const card=document.createElement('div');
    card.className=`brand-card ${sc.cls}${selectedBrand===id?' selected':''}`;
    card.onclick=()=>selectBrand(id,card);
    card.innerHTML=`
      <div class="brand-card-accent" style="background:${color}"></div>
      <div class="brand-sentiment-emoji">${sc.emoji}</div>
      <div class="brand-card-name">${BRAND_LABELS[id]}</div>
      <div class="brand-sentiment-label ${sc.cls}">${sc.label}</div>
      <div class="brand-metrics">
        <div class="bm-row"><span class="bm-label">Revenue</span><span class="bm-right"><span class="bm-value">${fmtCur(d.revenue)}</span>${fmtYoy(d.revenueYoy)}</span></div>
        <div class="bm-row"><span class="bm-label">Glance Views</span><span class="bm-right"><span class="bm-value">${fmtNum(d.gviews)}</span>${fmtYoy(d.gviewsYoy)}</span></div>
        <div class="bm-row"><span class="bm-label">Conversion</span><span class="bm-right"><span class="bm-value">${d.conv.toFixed(2)}%</span></span></div>
        <div class="bm-row"><span class="bm-label">ASP</span><span class="bm-right"><span class="bm-value">${fmtCur(d.asp)}</span></span></div>
        <div class="brand-divider"></div>
        <div class="bm-row"><span class="bm-label">Repeat Rate</span><span class="bm-right"><span class="bm-value">${d.repeatRate!==null?(d.repeatRate*100).toFixed(1)+'%':'—'}</span></span></div>
        <div class="bm-row"><span class="bm-label">Est. LTV</span><span class="bm-right"><span class="ltv-badge" style="${d.ltv?'':'opacity:0.4'}">${d.ltv?fmtCur(d.ltv):'Upload Q data'}</span></span></div>
      </div>
      ${supplyClass?`<div class="supply-alert ${supplyClass}">${supplyText}</div>`:''}
      ${adOpp?`<div class="ad-opp">💡 Ad Opportunity</div>`:''}
    `;
    grid.appendChild(card);
  });
}

function selectBrand(brandId,cardEl) {
  selectedBrand=brandId;
  document.querySelectorAll('.brand-card').forEach(c=>c.classList.remove('selected'));
  if(cardEl) cardEl.classList.add('selected');
  const d=aggregateBrand(brandId);
  document.getElementById('rca-emoji').textContent=SC[getSentiment(d)].emoji;
  document.getElementById('rca-name').textContent=BRAND_LABELS[brandId];
  document.getElementById('rca-panel').style.display='block';
  renderRCA(brandId,currentTab);
  setTimeout(()=>document.getElementById('rca-panel').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function setTab(tab,btn) {
  currentTab=tab;
  document.querySelectorAll('.rca-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(selectedBrand) renderRCA(selectedBrand,tab);
}

function renderRCA(brandId,tab) {
  const rows=getRows(brandId);
  const d=aggregateBrand(brandId);
  const loyalty=loyaltyData[brandId];

  // KPI row — always shown
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">Revenue</div><div class="kpi-value c-blue">${fmtCur(d.revenue)}</div><div class="kpi-yoy">${fmtYoyText(d.revenueYoy)} vs last year</div></div>
    <div class="kpi-card"><div class="kpi-label">Glance Views</div><div class="kpi-value c-green">${fmtNum(d.gviews)}</div><div class="kpi-yoy">${fmtYoyText(d.gviewsYoy)} vs last year</div></div>
    <div class="kpi-card"><div class="kpi-label">Conversion Rate</div><div class="kpi-value c-amber">${d.conv.toFixed(2)}%</div><div class="kpi-yoy">Units ÷ Glance Views</div></div>
    <div class="kpi-card"><div class="kpi-label">Root Cause</div><div class="kpi-value c-text" style="font-size:14px;line-height:1.3;margin-top:4px;">${d.unfilled>200||d.avgOos>20?`<span style="color:var(--red)">⚠️ Supply Issue</span>`:(d.conv<3&&d.gviews>5000)?`<span style="color:var(--amber)">👁️ Low Conversion</span>`:(d.revenueYoy!==null&&d.revenueYoy<0)?`<span style="color:var(--red)">📉 Revenue Down</span>`:`<span style="color:var(--green)">✅ On Track</span>`}</div><div class="kpi-yoy">Unfilled: ${Math.round(d.unfilled)} · OOS: ${d.avgOos.toFixed(1)}%</div></div>
  `;
  const wrap=document.getElementById('table-wrap');

  if(tab==='revenue') {
    const m=buildAsinMap(rows,r=>({rev:r.dispatched_revenue||r.ordered_revenue||0,revYoy:r.revenue_yoy,units:r.dispatched_units||r.ordered_units||0}));
    const top=Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,15);
    const maxR=top[0]?.rev||1;
    wrap.innerHTML=buildTable(['#','ASIN','Product','Market','Revenue','YoY','Units'],
      top.map((r,i)=>`<tr>
        <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
        <td><div class="td-asin">${r.asin}</div></td>
        <td><span class="td-name" title="${r.name}">${r.name}</span></td>
        <td><span class="mp mp-${r.market}">${r.market}</span></td>
        <td class="td-val">${fmtCur(r.rev)}<div class="bar-bg"><div class="bar-fg" style="width:${(r.rev/maxR*100).toFixed(1)}%"></div></div></td>
        <td class="td-yoy">${fmtYoyText(r.revYoy)}</td>
        <td class="td-val">${Math.round(r.units).toLocaleString()}</td>
      </tr>`));
  } else if(tab==='traffic') {
    const m=buildAsinMap(rows,r=>({gv:r.glance_views||0,gvYoy:r.glance_views_yoy}));
    const top=Object.values(m).sort((a,b)=>b.gv-a.gv).slice(0,15);
    const maxG=top[0]?.gv||1;
    wrap.innerHTML=buildTable(['#','ASIN','Product','Market','Glance Views','YoY'],
      top.map((r,i)=>`<tr>
        <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
        <td><div class="td-asin">${r.asin}</div></td>
        <td><span class="td-name" title="${r.name}">${r.name}</span></td>
        <td><span class="mp mp-${r.market}">${r.market}</span></td>
        <td class="td-val">${r.gv.toLocaleString()}<div class="bar-bg"><div class="bar-fg" style="width:${(r.gv/maxG*100).toFixed(1)}%"></div></div></td>
        <td class="td-yoy">${fmtYoyText(r.gvYoy)}</td>
      </tr>`));
  } else if(tab==='conversion') {
    const m=buildAsinMap(rows,r=>({gv:r.glance_views||0,units:r.dispatched_units||r.ordered_units||0,rev:r.dispatched_revenue||r.ordered_revenue||0}));
    const top=Object.values(m).filter(r=>r.gv>50).map(r=>({...r,conv:r.gv>0?(r.units/r.gv)*100:0,asp:r.units>0?r.rev/r.units:0})).sort((a,b)=>a.conv-b.conv).slice(0,15);
    wrap.innerHTML=`
      <div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text2);">
        <b style="color:var(--amber)">Root Cause Analysis:</b> ASINs sorted by lowest conversion first. High traffic + low conversion = content, price or review issue worth investigating.
      </div>`+
      buildTable(['#','ASIN','Product','Market','Conversion','ASP','Views','Units'],
      top.map((r,i)=>`<tr>
        <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
        <td><div class="td-asin">${r.asin}</div></td>
        <td><span class="td-name" title="${r.name}">${r.name}${r.conv<2&&r.gv>1000?'<span class="flag flag-low">Low Conv</span>':''}</span></td>
        <td><span class="mp mp-${r.market}">${r.market}</span></td>
        <td class="td-val" style="color:${r.conv<2?'var(--red)':r.conv<5?'var(--amber)':'var(--green)'};font-weight:700">${r.conv.toFixed(2)}%</td>
        <td class="td-val">${fmtCur(r.asp)}</td>
        <td class="td-val">${r.gv.toLocaleString()}</td>
        <td class="td-val">${Math.round(r.units).toLocaleString()}</td>
      </tr>`));
  } else if(tab==='supply') {
    const m=buildAsinMap(rows,r=>({oos:r.oos_pct||0,unfilled:r.unfilled_units||0,rev:r.dispatched_revenue||r.ordered_revenue||0}));
    const top=Object.values(m).filter(r=>r.oos>0||r.unfilled>0).sort((a,b)=>b.unfilled-a.unfilled).slice(0,15);
    wrap.innerHTML=buildTable(['#','ASIN','Product','Market','OOS %','Unfilled','Revenue at Risk'],
      top.map((r,i)=>`<tr>
        <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
        <td><div class="td-asin">${r.asin}</div></td>
        <td><span class="td-name" title="${r.name}">${r.name}</span></td>
        <td><span class="mp mp-${r.market}">${r.market}</span></td>
        <td class="td-val"><span style="color:${r.oos>20?'var(--red)':r.oos>10?'var(--amber)':'var(--green)'};font-weight:700">${r.oos.toFixed(1)}%</span></td>
        <td class="td-val" style="color:${r.unfilled>100?'var(--red)':r.unfilled>50?'var(--amber)':'var(--text)'};font-weight:700">${Math.round(r.unfilled).toLocaleString()}</td>
        <td class="td-val" style="color:var(--red)">${r.oos>10?fmtCur(r.rev*(r.oos/100)):'—'}</td>
      </tr>`));
  } else if(tab==='adopp') {
    const m=buildAsinMap(rows,r=>({rev:r.dispatched_revenue||r.ordered_revenue||0,units:r.dispatched_units||r.ordered_units||0,gv:r.glance_views||0,oos:r.oos_pct||0}));
    // Ad opportunity = high ASP + low conversion + decent traffic + in stock
    const opps=Object.values(m).filter(r=>r.gv>50).map(r=>({
      ...r,
      asp:r.units>0?r.rev/r.units:0,
      conv:r.gv>0?(r.units/r.gv)*100:0
    })).filter(r=>r.asp>5&&r.oos<20).sort((a,b)=>(b.asp*b.gv)-(a.asp*a.gv)).slice(0,15);
    wrap.innerHTML=`
      <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text2);">
        <b style="color:#4F46E5">💡 Ad Opportunity Logic:</b> ASINs with high ASP (price point justifies ad spend) + low conversion (something stopping the purchase) + decent traffic (demand exists) + in stock. These are prime candidates for Sponsored Products.
      </div>`+
      (opps.length===0?'<div class="empty">No strong ad opportunities identified for this brand with current data.</div>':
      buildTable(['#','ASIN','Product','Market','ASP','Conv %','Views','OOS %','Score'],
      opps.map((r,i)=>{
        const score=Math.round((r.asp*r.gv/1000)*(1-(r.conv/8)));
        return`<tr>
          <td style="color:var(--text3);font-size:11px">${String(i+1).padStart(2,'0')}</td>
          <td><div class="td-asin">${r.asin}</div></td>
          <td><span class="td-name" title="${r.name}">${r.name}<span class="flag flag-ad">AD OPP</span></span></td>
          <td><span class="mp mp-${r.market}">${r.market}</span></td>
          <td class="td-val" style="color:var(--amber);font-weight:700">${fmtCur(r.asp)}</td>
          <td class="td-val" style="color:${r.conv<3?'var(--red)':'var(--amber)'};font-weight:700">${r.conv.toFixed(2)}%</td>
          <td class="td-val">${r.gv.toLocaleString()}</td>
          <td class="td-val" style="color:${r.oos>10?'var(--amber)':'var(--green)'}">${r.oos.toFixed(1)}%</td>
          <td class="td-val" style="color:#4F46E5;font-weight:700">${score}</td>
        </tr>`;
      })));
  }
}

function buildAsinMap(rows, extractor) {
  const m={};
  const yoyKeys=['revYoy','gvYoy','oos']; // these should use last value not sum
  rows.forEach(r=>{
    const k=r.asin+'_'+r.market;
    if(!m[k]) m[k]={asin:r.asin,name:r.product_title,market:r.market,...Object.fromEntries(Object.entries(extractor(r)).map(([k,v])=>[k,typeof v==='number'?0:null]))};
    const vals=extractor(r);
    Object.entries(vals).forEach(([key,val])=>{
      if(val!==null&&val!==undefined){
        if(yoyKeys.includes(key)) m[k][key]=val; // overwrite, don't sum
        else m[k][key]=(m[k][key]||0)+val;
      }
    });
  });
  return m;
}

function renderSupplyAlerts() {
  let rows=allRows;
  if(currentMarket!=='ALL') rows=rows.filter(r=>r.market===currentMarket);
  const seen=new Set(); const alerts=[];
  rows.forEach(r=>{
    const oos=r.oos_pct||0; const uf=r.unfilled_units||0;
    if((oos>10||uf>50)&&r.asin){
      const k=r.asin+'_'+r.market;
      if(!seen.has(k)){seen.add(k);alerts.push({asin:r.asin,name:r.product_title,market:r.market,oos,uf});}
    }
  });
  alerts.sort((a,b)=>b.uf-a.uf);
  const g=document.getElementById('supply-items');
  if(!alerts.length){g.innerHTML='<div class="empty">✅ No supply gap alerts this week</div>';return;}
  g.innerHTML=alerts.slice(0,16).map(a=>`
    <div class="supply-item">
      <div class="si-asin">${a.asin} <span class="mp mp-${a.market}">${a.market}</span></div>
      <div class="si-name" title="${a.name}">${a.name}</div>
      <div class="si-stats">
        <div class="si-stat"><b style="color:${a.oos>20?'var(--red)':'var(--amber)'}">${a.oos.toFixed(1)}%</b> OOS</div>
        <div class="si-stat"><b style="color:${a.uf>100?'var(--red)':'var(--amber)'}">${Math.round(a.uf)}</b> unfilled</div>
      </div>
    </div>`).join('');
}

function buildTable(headers,rows){
  return`<table class="data-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

// ─── CONTROLS ────────────────────────────────────────────────
function setMarket(m,btn){currentMarket=m;document.querySelectorAll('.market-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildDashboard();}
function setSort(s,btn){currentSort=s;document.querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderBrandCards();}
function setCurrency(c){currency=c;['eur','gbp','usd'].forEach(x=>document.getElementById('btn-'+x).classList.remove('active'));document.getElementById('btn-'+c).classList.add('active');renderBrandCards();if(selectedBrand)renderRCA(selectedBrand,currentTab);}

// ─── FORMATTING ──────────────────────────────────────────────
function fmtCur(val){
  const v=val*FX[currency];
  const sym=currency==='gbp'?'£':currency==='usd'?'$':'€';
  if(v>=1000000) return sym+(v/1000000).toFixed(1)+'M';
  if(v>=1000) return sym+(v/1000).toFixed(1)+'K';
  return sym+v.toFixed(0);
}
function fmtNum(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return Math.round(n).toLocaleString();}
function fmtYoy(val){
  if(val===null||val===undefined||isNaN(val))return'<span class="yoy yoy-na">n/a</span>';
  const p=(val*100).toFixed(1);const cls=val>0?'yoy-up':val<0?'yoy-down':'yoy-na';const arr=val>0?'▲':val<0?'▼':'';
  return`<span class="yoy ${cls}">${arr}${Math.abs(p)}%</span>`;
}
function fmtYoyText(val){
  if(val===null||val===undefined||isNaN(val))return'<span style="color:var(--text3)">n/a</span>';
  const p=(val*100).toFixed(1);const col=val>0?'var(--green)':val<0?'var(--red)':'var(--text3)';const arr=val>0?'▲':val<0?'▼':'';
  return`<span style="color:${col};font-weight:700">${arr}${Math.abs(p)}%</span>`;
}
